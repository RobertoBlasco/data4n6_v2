# Application
spring.application.name=data4n6-backend

# DataSource
spring.datasource.url=jdbc:postgresql://192.168.0.16:5433/data4n6
spring.datasource.username=data4n6
spring.datasource.password=data4n6
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# DevTools — disable hot-restart (IntelliJ incremental compiler generates broken MapStruct stubs)
spring.devtools.restart.enabled=false

# HTTP compression
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/tenant
spring.flyway.schemas=tenant_default
spring.flyway.default-schema=tenant_default
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# Actuator
management.endpoints.web.exposure.include=health,info

# File uploads
inventory.upload.dir=${user.home}/data4n6-uploads/pictures
inventory.upload.url-prefix=http://82.165.171.13:8080/uploads/pictures
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=22MB
