# Application
spring.application.name=data4n6-backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/data4n6
spring.datasource.username=data4n6
spring.datasource.password=data4n6
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway — runs on tenant_default schema (dev tenant)
# Schema creation is handled by V0__create_schemas.sql
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/tenant
spring.flyway.schemas=tenant_default
spring.flyway.default-schema=tenant_default
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# SpringDoc / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=alpha

# Actuator
management.endpoints.web.exposure.include=health,info
